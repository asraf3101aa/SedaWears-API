openapi: 3.0.3
info:
  title: Luga Store API
  version: 1.0.0
  description: API documentation for the Luga Store backend, listing all customer, shop manager/owner, and administrator endpoints.

security:
  - CookieAuth: []

paths:
  # --- AUTHENTICATION ---
  /auth/login:
    post:
      tags: [Authentication]
      summary: Login to an account and receive session cookie
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful, sets session cookie.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new customer account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Sign out and invalidate session cookie
      responses:
      '200':
        description: Logout successful
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request password reset link
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset account password using token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
        '400':
          $ref: '#/components/responses/BadRequest'

  # --- INVITATIONS ---
  /invitations/accept-owner:
    post:
      tags: [Invitations]
      summary: Accept a shop owner invitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptShopMemberInvitationRequest'
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /invitations/accept-manager:
    post:
      tags: [Invitations]
      summary: Accept a shop manager invitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptShopMemberInvitationRequest'
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /invitations/accept-admin:
    post:
      tags: [Invitations]
      summary: Accept an admin invitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptAdminInvitationRequest'
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /invitations/owner-details:
    get:
      tags: [Invitations]
      summary: Get details of a shop owner invitation
      security: []
      parameters:
        - name: shopId
          in: query
          required: true
          schema:
            type: integer
        - name: email
          in: query
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationDetails'

  /invitations/manager-details:
    get:
      tags: [Invitations]
      summary: Get details of a shop manager invitation
      security: []
      parameters:
        - name: shopId
          in: query
          required: true
          schema:
            type: integer
        - name: email
          in: query
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationDetails'

  /invitations/admin-details:
    get:
      tags: [Invitations]
      summary: Get details of an admin invitation
      security: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInvitationDetails'

  # --- GLOBAL CATEGORIES (Admin/Owner/Manager) ---
  /categories:
    get:
      tags: [Categories (Global)]
      summary: Get all global or shop-linked categories
      security: []
      parameters:
        - name: shopId
          in: query
          schema:
            type: integer
        - name: pageNumber
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sortBy
          in: query
          schema:
            type: string
            default: name
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Categories retrieved

    post:
      tags: [Categories (Global)]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertCategoryRequest'
      responses:
        '200':
          description: Category created successfully

  /categories/{id}:
    put:
      tags: [Categories (Global)]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertCategoryRequest'
      responses:
        '200':
          description: Category updated successfully

    delete:
      tags: [Categories (Global)]
      summary: Delete a category (high performance)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shopId
          in: query
          schema:
            type: integer
      responses:
      '200':
        description: Category deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  /categories/{id}/status:
    patch:
      tags: [Categories (Global)]
      summary: Toggle category active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryActiveStatusRequest'
      responses:
        '200':
          description: Active status updated successfully

  /categories/reorder:
    post:
      tags: [Categories (Global)]
      summary: Reorder categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderCategoriesRequest'
      responses:
        '200':
          description: Reordered successfully

  # --- SHOP-LEVEL CATEGORIES ---
  /shops/{shopId}/categories:
    get:
      tags: [Categories (Shop)]
      summary: Get all categories of a shop
      security: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
        - name: pageNumber
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sortBy
          in: query
          schema:
            type: string
            default: name
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Categories list retrieved

    post:
      tags: [Categories (Shop)]
      summary: Create a category under a shop
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShopUpsertCategoryRequest'
      responses:
        '200':
          description: Category created successfully

  /shops/{shopId}/categories/{id}:
    put:
      tags: [Categories (Shop)]
      summary: Update a category under a shop
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShopUpsertCategoryRequest'
      responses:
        '200':
          description: Category updated successfully

    delete:
      tags: [Categories (Shop)]
      summary: Delete a shop category
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
      '200':
        description: Category deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  /shops/{shopId}/categories/{id}/status:
    patch:
      tags: [Categories (Shop)]
      summary: Toggle active status of a shop category
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryActiveStatusRequest'
      responses:
        '200':
          description: Status toggled successfully

  /shops/{shopId}/categories/reorder:
    post:
      tags: [Categories (Shop)]
      summary: Reorder categories of a shop
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderCategoriesRequest'
      responses:
        '200':
          description: Reordered successfully

  # --- GLOBAL PRODUCTS ---
  /products:
    get:
      tags: [Products (Global)]
      summary: Get list of products
      security: []
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: shopId
          in: query
          schema:
            type: integer
        - name: pageNumber
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of products

    post:
      tags: [Products (Global)]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProductRequest'
      responses:
        '200':
          description: Product created successfully

  /products/{id}:
    get:
      tags: [Products (Global)]
      summary: Get details of a single product
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product details

    put:
      tags: [Products (Global)]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProductRequest'
      responses:
        '200':
          description: Product updated successfully

    delete:
      tags: [Products (Global)]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
      '200':
        description: Product deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  /products/{id}/sizes:
    patch:
      tags: [Products (Global)]
      summary: Sync product size inventories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductSizesRequest'
      responses:
        '200':
          description: Product sizes updated successfully

  /products/{id}/status:
    patch:
      tags: [Products (Global)]
      summary: Change product active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductActiveStatusRequest'
      responses:
        '200':
          description: Status updated successfully

  # --- SHOP-LEVEL PRODUCTS ---
  /shops/{shopId}/products:
    get:
      tags: [Products (Shop)]
      summary: Get products of a shop
      security: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: pageNumber
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Shop products

    post:
      tags: [Products (Shop)]
      summary: Create a product in a shop
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProductRequest'
      responses:
        '200':
          description: Product created successfully

  /shops/{shopId}/products/{id}:
    put:
      tags: [Products (Shop)]
      summary: Update a product in a shop
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProductRequest'
      responses:
        '200':
          description: Product updated successfully

    delete:
      tags: [Products (Shop)]
      summary: Delete a product in a shop
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
      '200':
        description: Product deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  /shops/{shopId}/products/{id}/status:
    patch:
      tags: [Products (Shop)]
      summary: Toggle active status of a product in a shop
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductActiveStatusRequest'
      responses:
        '200':
          description: Product status updated successfully

  # --- CUSTOMER PROFILE ---
  # --- CUSTOMER PROFILE ---
  /profile:
    get:
      tags: [Profile]
      summary: Get the authenticated user's profile with all roles
      responses:
        '200':
          description: User profile details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'

    patch:
      tags: [Profile]
      summary: Update the authenticated user's profile details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
      '200':
        description: Profile updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  /profile/password:
    patch:
      tags: [Profile]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeUserPasswordRequest'
      responses:
      '200':
        description: Password changed successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  /profile/shops:
    get:
      tags: [Profile]
      summary: Get shops managed or owned by the current user
      parameters:
        - name: pageNumber
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: sortBy
          in: query
          schema:
            type: string
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of user owned/managed shops

  # --- CUSTOMER ADDRESSES ---
  /profile/addresses:
    get:
      tags: [Addresses]
      summary: Get customer's saved addresses (max 5)
      responses:
        '200':
          description: List of saved addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressDto'

    post:
      tags: [Addresses]
      summary: Add a new shipping address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
      responses:
        '200':
          description: Address created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressDto'
        '400':
          $ref: '#/components/responses/BadRequest'

  /profile/addresses/{id}:
    delete:
      tags: [Addresses]
      summary: Delete a shipping address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
      '200':
        description: Address deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  # --- CUSTOMER CART ---
  /profile/cart:
    get:
      tags: [Cart]
      summary: Retrieve the current user's shopping cart
      responses:
        '200':
          description: Cart details

    post:
      tags: [Cart]
      summary: Add an item to the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
      responses:
        '200':
          description: Added successfully

    delete:
      tags: [Cart]
      summary: Clear all items in the cart
      responses:
      '200':
        description: Cart cleared successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  /profile/cart/{id}:
    put:
      tags: [Cart]
      summary: Update quantity or size of a cart item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartRequest'
      responses:
        '200':
          description: Updated successfully

    delete:
      tags: [Cart]
      summary: Remove an item from the cart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
      '200':
        description: Item removed successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  # --- WISHLIST ---
  /profile/wishlist:
    get:
      tags: [Wishlist]
      summary: Get the current user's wishlist
      responses:
        '200':
          description: Wishlist retrieved

  /profile/wishlist/{productId}:
    post:
      tags: [Wishlist]
      summary: Add a product to the wishlist (with unique composite check)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product added to wishlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

    delete:
      tags: [Wishlist]
      summary: Remove a product from the wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
      '200':
        description: Product removed from wishlist
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

  # --- ORDERS (Checkout & History) ---
  /orders:
    post:
      tags: [Orders]
      summary: Complete order checkout (supports guests and registered users)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Checkout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutDto'
        '400':
          $ref: '#/components/responses/BadRequest'

  /profile/orders:
    get:
      tags: [Orders]
      summary: Get the authenticated customer's order history
      responses:
        '200':
          description: Order history retrieved

  /admin/orders:
    get:
      tags: [Orders (Admin)]
      summary: Get customer orders list
      parameters:
        - name: customerId
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of orders

  /admin/orders/{orderId}/status:
    patch:
      tags: [Orders (Admin)]
      summary: Update status of an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
        - name: customerId
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
              description: OrderStatus enum value (e.g. 0=Pending, 1=Processing, 2=Shipped, 3=Delivered, 4=Cancelled)
      responses:
        '200':
          description: Order status updated successfully

  # --- MEDIA MANAGEMENT ---
  /media/upload-url:
    post:
      tags: [Media]
      summary: Request presigned S3 URLs to upload files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileS3UploadUrlRequest'
      responses:
        '200':
          description: Upload URLs generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileUploadUrl'

  /media/{filename}:
    delete:
      tags: [Media]
      summary: Delete an uploaded file
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
      '200':
        description: File deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
