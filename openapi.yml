components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: .AspNetCore.Identity.Application

  responses:
    BadRequest:
      description: Invalid request parameters or validation failed
    Unauthorized:
      description: Unauthenticated or missing permissions
    NotFound:
      description: Requested resource not found

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        rememberMe:
          type: boolean
          default: false

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [email, token, newPassword]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        newPassword:
          type: string

    AcceptShopMemberInvitationRequest:
      type: object
      required: [shopId, email, token, firstName, lastName, password]
      properties:
        shopId:
          type: integer
        email:
          type: string
          format: email
        token:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        password:
          type: string

    AcceptAdminInvitationRequest:
      type: object
      required: [email, token, firstName, lastName, password]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        password:
          type: string

    InvitationDetails:
      type: object
      properties:
        shopId:
          type: integer
        shopName:
          type: string
        email:
          type: string

    AdminInvitationDetails:
      type: object
      properties:
        email:
          type: string

    UpsertCategoryRequest:
      type: object
      required: [name]
      properties:
        shopId:
          type: integer
          nullable: true
        name:
          type: string
        description:
          type: string

    ShopUpsertCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    UpdateCategoryActiveStatusRequest:
      type: object
      required: [isActive]
      properties:
        isActive:
          type: boolean
        shopId:
          type: integer
          nullable: true

    ReorderCategoriesRequest:
      type: object
      required: [orders]
      properties:
        shopId:
          type: integer
          nullable: true
        orders:
          type: array
          items:
            type: object
            required: [id, displayOrder]
            properties:
              id:
                type: integer
              displayOrder:
                type: integer

    UpsertProductRequest:
      type: object
      required: [name, price, categoryId]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: decimal
        gender:
          type: string
          enum: [Men, Women, Unisex]
        categoryId:
          type: integer
        images:
          type: array
          items:
            type: string

    UpdateProductSizesRequest:
      type: object
      required: [sizes]
      properties:
        sizes:
          type: array
          items:
            $ref: '#/components/schemas/ProductSizeDto'

    ProductSizeDto:
      type: object
      required: [size, stock]
      properties:
        size:
          type: string
          enum: [XS, S, M, L, XL, XXL, XXXL]
        stock:
          type: integer

    UpdateProductActiveStatusRequest:
      type: object
      required: [isActive]
      properties:
        isActive:
          type: boolean

    UserDto:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        avatarFileName:
          type: string
          nullable: true
        isEmailConfirmed:
          type: boolean
        createdAt:
          type: string
          format: date-time

    InvitedUserDto:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    PaginatedUserList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserDto'
        totalCount:
          type: integer
        pageIndex:
          type: integer
        pageSize:
          type: integer

    PaginatedInvitedUserList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InvitedUserDto'
        totalCount:
          type: integer
        pageIndex:
          type: integer
        pageSize:
          type: integer

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true

    ShopSummaryDto:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        subdomainSlug:
          type: string

    AddressDto:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        street:
          type: string
        city:
          type: string
        zipCode:
          type: string

    AddressRequest:
      type: object
      required: [fullName, street, city, zipCode]
      properties:
        label:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        street:
          type: string
        city:
          type: string
        zipCode:
          type: string

    AddToCartRequest:
      type: object
      required: [productId, size, quantity]
      properties:
        productId:
          type: integer
        size:
          type: string
          enum: [XS, S, M, L, XL, XXL, XXXL]
        quantity:
          type: integer

    UpdateCartRequest:
      type: object
      required: [size, quantity]
      properties:
